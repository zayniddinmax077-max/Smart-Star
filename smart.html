<section id="contact" class="pb-32 px-6 relative z-10">
    <div class="ultra-glass max-w-5xl mx-auto p-12 md:p-20 grid lg:grid-cols-2 gap-16 items-center" id="apply">
        <div class="text-center lg:text-left text-white">
            <h2 class="text-5xl font-black uppercase mb-6">Smart<br>Kelajak.</h2>
            <p class="text-xs font-bold opacity-60 uppercase tracking-widest">Kursni tanlang va biz bilan bog'laning.</p>
        </div>
        
        <form id="tgForm" class="space-y-4">
            <input type="text" id="userName" required placeholder="F.I.SH" 
                   class="w-full p-5 rounded-2xl outline-none text-[10px] font-black uppercase tracking-widest bg-white/10 border border-white/20 text-white focus:border-white transition-all">
            
            <input type="tel" id="userPhone" required placeholder="+998" 
                   class="w-full p-5 rounded-2xl outline-none text-[10px] font-black uppercase tracking-widest bg-white/10 border border-white/20 text-white focus:border-white transition-all">
            
            <div class="relative">
                <select id="userCourse" required 
                        class="w-full p-5 rounded-2xl outline-none text-[10px] font-black uppercase tracking-widest bg-white/10 border border-white/20 text-white appearance-none cursor-pointer focus:border-white transition-all">
                    <option value="" disabled selected class="bg-black text-white">Kursni tanlang</option>
                    <option value="IELTS" class="bg-black text-white">IELTS (Shaxboz)</option>
                    <option value="MATEMATIKA" class="bg-black text-white">Matematika (Muhammadjon)</option>
                    <option value="SAT" class="bg-black text-white">SAT (Shohjahon)</option>
                    <option value="GENERAL ENGLISH" class="bg-black text-white">General English</option>
                </select>
                <div class="absolute right-5 top-5 pointer-events-none opacity-50">▼</div>
            </div>

            <button type="submit" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-[10px] hover:scale-95 transition shadow-2xl">Ro'yxatdan o'tish</button>
            <p id="statusMsg" class="text-[9px] font-black text-center uppercase hidden mt-4 text-white"></p>
        </form>
    </div>
</section>

<script>
    const botToken = "8685609046:AAGVduld-jH-WHxtO1AT7MNTrQCPz46h13o"; 
    const chatId = "8490005495"; 
    
    document.getElementById('tgForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const status = document.getElementById('statusMsg');
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const course = document.getElementById('userCourse').value; // Kurs qiymatini olamiz
        
        const message = `🚀 YANGI ARIZA%0A👤: ${name}%0A📞: ${phone}%0A📚 KURS: ${course}`;
        
        const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${message}`;
        
        status.classList.remove('hidden');
        status.innerText = "Yuborilmoqda...";
        
        fetch(url).then(res => res.json()).then(data => {
            if(data.ok) { 
                status.innerText = "✅ ARIZANGIZ QABUL QILINDI!"; 
                status.style.color = "#4ade80"; // Yashil rang
                this.reset(); 
            } else {
                status.innerText = "❌ XATOLIK YUZ BERDI";
            }
        });
    });
</script>
